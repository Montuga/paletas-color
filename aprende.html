<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende · Teoría del Color</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════ */
:root {
  --bg:        #08090b;
  --surface:   #101214;
  --surface2:  #181a1d;
  --border:    #222528;
  --text:      #dddcda;
  --text-muted:#878c97;
  --accent:    #c97a2f;
  --accent-dk: #9a5c22;
  --white:     #ffffff;
  --font:      'Montserrat', 'Segoe UI', system-ui, sans-serif;
  --ease:      cubic-bezier(0.76, 0, 0.24, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}
@media (hover: hover) and (pointer: fine) {
  body { cursor: none; }
}

img { display: block; max-width: 100%; }
a   { text-decoration: none; color: inherit; }
ul  { list-style: none; }

/* ═══════════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════════ */
#cursor-dot {
  position: fixed;
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
}
#cursor-ring {
  position: fixed;
  width: 36px; height: 36px;
  border: 1.5px solid rgba(201,122,47,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%, -50%);
  transition: width 0.35s var(--ease), height 0.35s var(--ease), border-color 0.35s;
}
body.cursor-hover #cursor-ring {
  width: 58px; height: 58px;
  border-color: var(--accent);
}

/* ═══════════════════════════════════════════
   PAGE LOADER
═══════════════════════════════════════════ */
#pageLoader {
  position: fixed;
  inset: 0;
  background: #08090b;
  z-index: 999999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#loaderWheel {
  position: relative;
  width: 200px; height: 200px;
  flex-shrink: 0;
}
#loaderSvg {
  width: 200px; height: 200px;
  animation: loaderRotate 8s linear infinite;
}
@keyframes loaderRotate { to { transform: rotate(360deg); } }
#loaderCenterDot {
  position: absolute;
  top: 50%; left: 50%;
  width: 8px; height: 8px;
  background: #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: loaderDotPulse 1.2s ease-in-out infinite;
}
@keyframes loaderDotPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50%       { transform: translate(-50%, -50%) scale(1.4); }
}
.loader-seg { opacity: 0; animation: loaderSegIn 0.3s ease forwards; }
@keyframes loaderSegIn { from { opacity: 0; } to { opacity: 1; } }
#loaderName {
  margin-top: 2rem;
  font-size: 0.82rem; font-weight: 700;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--accent);
  opacity: 0;
  animation: loaderFadeUp 0.5s ease 1s forwards;
}
#loaderTagline {
  margin-top: 0.5rem;
  font-size: 0.62rem; font-weight: 300;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  opacity: 0;
  animation: loaderFadeUp 0.5s ease 1.2s forwards;
}
@keyframes loaderFadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
#loaderPercent {
  position: fixed;
  bottom: 2rem; right: 2rem;
  font-size: 0.68rem; font-weight: 900;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.15);
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
nav.site-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.6rem 4rem;
  transition: background 0.4s, padding 0.4s, backdrop-filter 0.4s;
}
nav.site-nav.scrolled {
  background: rgba(8,9,11,0.94);
  backdrop-filter: blur(14px);
  padding: 0.9rem 4rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.nav-logo {
  font-size: 0.82rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent);
}
.nav-links { display: flex; align-items: center; gap: 2rem; }
.nav-links a {
  font-size: 0.68rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.38);
  transition: color 0.2s;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0; right: 0;
  height: 1px; background: var(--accent);
  transform: scaleX(0); transform-origin: right;
  transition: transform 0.3s var(--ease);
}
.nav-links a:hover { color: var(--white); }
.nav-links a:hover::after { transform: scaleX(1); transform-origin: left; }

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
.hero {
  min-height: 52vh;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 0 4rem;
}
.hero-bg-text {
  position: absolute;
  font-size: clamp(14rem, 28vw, 30rem);
  font-weight: 900;
  color: rgba(255,255,255,0.018);
  user-select: none;
  pointer-events: none;
  line-height: 1;
  letter-spacing: -0.04em;
}
.hero-content {
  position: relative; z-index: 2;
  max-width: 1100px; width: 100%;
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 1.5rem;
}
.hero-eyebrow {
  font-size: 0.68rem; font-weight: 600;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--accent);
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.7s 0.2s, transform 0.7s 0.2s var(--ease);
}
.hero-eyebrow.in { opacity: 1; transform: none; }
.hero-title {
  font-size: clamp(3.2rem, 8vw, 8rem);
  font-weight: 900; line-height: 0.9;
  letter-spacing: -0.04em; text-transform: uppercase;
}
.hero-title .line { display: block; overflow: hidden; }
.hero-title .line span {
  display: block;
  transform: translateY(110%);
  transition: transform 1s var(--ease);
}
.hero-title .line:nth-child(2) span { transition-delay: 0.12s; }
.hero-title .line span.accent {
  background: linear-gradient(to right, #ff0000, #ff6600, #ffcc00, #00cc44, #00cccc, #0066ff, #8800ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.05em;
}
.hero-desc {
  font-size: 0.84rem;
  color: rgba(255,255,255,0.3);
  line-height: 2;
  max-width: 500px;
  letter-spacing: 0.03em;
  opacity: 0; transform: translateY(18px);
  transition: opacity 0.8s 0.6s, transform 0.8s 0.6s var(--ease);
}
.hero-desc.in { opacity: 1; transform: none; }

/* ═══════════════════════════════════════════
   MAIN
═══════════════════════════════════════════ */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 2rem 4rem;
}

/* ═══════════════════════════════════════════
   SECTION TITLE
═══════════════════════════════════════════ */
.section-title {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.26em;
  text-transform: uppercase; color: var(--accent);
  border-left: 3px solid var(--accent); padding-left: 0.7rem;
  margin-bottom: 1.8rem;
  opacity: 0; transform: translateX(-16px);
  transition: opacity 0.7s var(--ease), transform 0.7s var(--ease);
}
.section-title.in { opacity: 1; transform: none; }

/* ═══════════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════════ */
.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.75s var(--ease), transform 0.75s var(--ease);
}
.reveal.in { opacity: 1; transform: none; }
.reveal-d1 { transition-delay: 0.08s; }
.reveal-d2 { transition-delay: 0.16s; }
.reveal-d3 { transition-delay: 0.24s; }
.reveal-d4 { transition-delay: 0.32s; }
.reveal-d5 { transition-delay: 0.40s; }

/* ═══════════════════════════════════════════
   TOPIC MAP GRID
═══════════════════════════════════════════ */
#topicMap {
  padding-top: 3rem;
}
.topic-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.2rem;
}
.topic-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.6rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  cursor: pointer;
  transition: transform 0.28s var(--ease), border-color 0.28s, box-shadow 0.28s;
  position: relative;
  overflow: hidden;
}
.topic-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(201,122,47,0.04) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}
.topic-card:hover {
  transform: translateY(-4px);
  border-color: rgba(201,122,47,0.5);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.topic-card:hover::before { opacity: 1; }

.topic-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.5rem;
}
.topic-number {
  font-size: 0.62rem; font-weight: 900;
  letter-spacing: 0.14em; color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.topic-badge {
  font-size: 0.55rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: rgba(201,122,47,0.15);
  color: var(--accent);
  border: 1px solid rgba(201,122,47,0.3);
  padding: 0.18rem 0.5rem;
  border-radius: 2px;
  white-space: nowrap;
}
.topic-complete-badge {
  font-size: 0.6rem; font-weight: 700;
  color: #f1c40f;
  display: none;
}
.topic-title {
  font-size: 1rem; font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.topic-desc {
  font-size: 0.74rem;
  color: var(--text-muted);
  line-height: 1.7;
}
.topic-visual {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  min-height: 28px;
}
.topic-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.1);
}
.topic-gradient-bar {
  height: 8px;
  border-radius: 4px;
  flex: 1;
  border: 1px solid rgba(255,255,255,0.07);
}

/* Progress bar */
.topic-progress-wrap {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.topic-progress-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.topic-progress-text {
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.topic-progress-score {
  font-size: 0.6rem;
  color: var(--accent);
  font-weight: 700;
}
.topic-progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.topic-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s var(--ease);
  width: 0%;
}

.topic-btn {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: transparent;
  color: var(--accent);
  border: 1px solid rgba(201,122,47,0.35);
  padding: 0.5rem 1rem;
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--font);
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  align-self: flex-start;
  margin-top: auto;
}
.topic-btn:hover {
  background: rgba(201,122,47,0.12);
  border-color: var(--accent);
  color: var(--white);
}

/* ═══════════════════════════════════════════
   LESSON VIEW
═══════════════════════════════════════════ */
#lessonView { display: none; padding-top: 3rem; }
#lessonView.active { display: block; }

.lesson-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}
.lesson-back-btn {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  padding: 0.5rem 1rem;
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--font);
  transition: color 0.2s, border-color 0.2s;
}
.lesson-back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

.lesson-header-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
}
.lesson-num {
  font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--accent);
}
.lesson-title-sm {
  font-size: 0.9rem; font-weight: 700;
  letter-spacing: -0.01em;
}

.lesson-progress-info {
  font-size: 0.62rem;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-align: right;
}

/* Lesson content area */
.lesson-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2.5rem;
  margin-bottom: 2.5rem;
  line-height: 1;
}
.lesson-content h2 {
  font-size: 1.5rem; font-weight: 900;
  letter-spacing: -0.03em;
  margin-bottom: 1rem;
  color: var(--white);
}
.lesson-content h3 {
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent);
  margin-top: 2rem; margin-bottom: 0.7rem;
  border-left: 2px solid var(--accent);
  padding-left: 0.6rem;
}
.lesson-content p {
  font-size: 0.86rem;
  color: rgba(221,220,218,0.8);
  line-height: 1.85;
  margin-bottom: 0.8rem;
}
.lesson-content ul {
  list-style: disc;
  padding-left: 1.3rem;
  margin-bottom: 0.8rem;
}
.lesson-content ul li {
  font-size: 0.86rem;
  color: rgba(221,220,218,0.8);
  line-height: 1.85;
}
.lesson-callout {
  background: rgba(201,122,47,0.08);
  border: 1px solid rgba(201,122,47,0.25);
  border-radius: 4px;
  padding: 1rem 1.2rem;
  margin-top: 1.8rem;
  font-size: 0.8rem;
  color: rgba(221,220,218,0.7);
  line-height: 1.75;
}
.lesson-callout strong {
  color: var(--accent);
}

/* Color dot groups in lesson */
.color-dots {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin: 1.1rem 0;
  flex-wrap: wrap;
}
.color-dot-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
}
.color-dot-circle {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.12);
}
.color-dot-label {
  font-size: 0.58rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted);
}
.color-strip {
  display: flex;
  gap: 2px;
  margin: 1.1rem 0;
  border-radius: 4px;
  overflow: hidden;
  max-width: 280px;
  height: 28px;
}
.color-strip-seg {
  flex: 1;
}
.value-gradient-bar {
  height: 22px;
  border-radius: 4px;
  margin: 1.1rem 0;
  max-width: 380px;
  display: flex;
  overflow: hidden;
}
.sphere-visual {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #e0e0e0, #888 50%, #222 80%);
  margin: 1.1rem 0;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: inset -8px 8px 24px rgba(0,0,0,0.6);
}
.contrast-pair {
  display: flex;
  gap: 4px;
  margin: 1.1rem 0;
  border-radius: 4px;
  overflow: hidden;
  max-width: 200px;
  height: 32px;
}
.contrast-half { flex: 1; }
.munsell-notation-card {
  display: inline-flex;
  align-items: center;
  gap: 0.8rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.5rem 0.9rem;
  margin: 0.3rem 0.3rem 0.3rem 0;
}
.munsell-notation-swatch {
  width: 30px; height: 30px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.1);
}
.munsell-notation-code {
  font-size: 0.75rem; font-family: monospace;
  color: var(--accent); font-weight: 700;
}

/* Simultaneous contrast demo */
.sim-contrast-demo {
  display: flex;
  gap: 1rem;
  margin: 1.1rem 0;
  flex-wrap: wrap;
}
.sim-contrast-bg {
  width: 100px; height: 60px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sim-contrast-inner {
  width: 30px; height: 30px;
  background: #888;
  border-radius: 2px;
}

/* Saturation contrast */
.sat-contrast-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin: 1.1rem 0;
  flex-wrap: wrap;
}
.sat-swatch {
  width: 38px; height: 38px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.08);
}
.sat-arrow {
  font-size: 1rem;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════
   QUIZ SECTION
═══════════════════════════════════════════ */
.quiz-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2rem;
}
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.quiz-title {
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--accent);
  border-left: 2px solid var(--accent);
  padding-left: 0.6rem;
}
.quiz-counter {
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}
.quiz-progress-bar {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-bottom: 1.8rem;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.4s var(--ease);
}

.quiz-question {
  font-size: 1rem; font-weight: 700;
  line-height: 1.45;
  margin-bottom: 1.5rem;
  letter-spacing: -0.01em;
}

/* Multiple choice grid */
.quiz-options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem;
  margin-bottom: 1.5rem;
}
.quiz-option-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.8rem 1rem;
  border-radius: 4px;
  font-size: 0.78rem; font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  text-align: left;
  transition: border-color 0.18s, background 0.18s, color 0.18s;
  line-height: 1.4;
}
.quiz-option-btn:hover:not([disabled]) {
  border-color: rgba(201,122,47,0.45);
  background: rgba(201,122,47,0.07);
}
.quiz-option-btn.correct {
  border-color: #27ae60;
  background: rgba(39,174,96,0.12);
  color: #2ecc71;
}
.quiz-option-btn.wrong {
  border-color: #c0392b;
  background: rgba(192,57,43,0.1);
  color: #e74c3c;
}
.quiz-option-btn.reveal-correct {
  border-color: #27ae60;
  background: rgba(39,174,96,0.08);
  color: #2ecc71;
}
.quiz-option-btn[disabled] { cursor: default; }

/* Visual-pick options */
.quiz-visual-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem;
  margin-bottom: 1.5rem;
}
.quiz-visual-btn {
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 4px;
  padding: 0.6rem;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  transition: border-color 0.18s;
}
.quiz-visual-btn:hover:not([disabled]) {
  border-color: rgba(201,122,47,0.5);
}

<script>
// ══════════════════════════════════════════════
// PAGE LOADER
// ══════════════════════════════════════════════
(function() {
  const SEGS = [
    {h:0,   s:'88%', l:'58%'},
    {h:30,  s:'90%', l:'58%'},
    {h:60,  s:'82%', l:'52%'},
    {h:90,  s:'70%', l:'42%'},
    {h:120, s:'65%', l:'38%'},
    {h:150, s:'65%', l:'40%'},
    {h:180, s:'75%', l:'44%'},
    {h:210, s:'78%', l:'54%'},
    {h:240, s:'76%', l:'56%'},
    {h:270, s:'72%', l:'55%'},
    {h:300, s:'68%', l:'50%'},
    {h:330, s:'78%', l:'55%'}
  ];
  const cx = 100, cy = 100, OR = 90, IR = 45, R = Math.PI / 180;

  function arcPath(i) {
    const a0 = (i * 30 - 90) * R;
    const a1 = (i * 30 - 90 + 29.4) * R;
    const x0o = +(cx + OR*Math.cos(a0)).toFixed(2), y0o = +(cy + OR*Math.sin(a0)).toFixed(2);
    const x1o = +(cx + OR*Math.cos(a1)).toFixed(2), y1o = +(cy + OR*Math.sin(a1)).toFixed(2);
    const x0i = +(cx + IR*Math.cos(a0)).toFixed(2), y0i = +(cy + IR*Math.sin(a0)).toFixed(2);
    const x1i = +(cx + IR*Math.cos(a1)).toFixed(2), y1i = +(cy + IR*Math.sin(a1)).toFixed(2);
    return `M${x0i},${y0i}L${x0o},${y0o}A${OR},${OR},0,0,1,${x1o},${y1o}L${x1i},${y1i}A${IR},${IR},0,0,0,${x0i},${y0i}Z`;
  }

  const NS  = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('loaderSvg');

  const defs = document.createElementNS(NS, 'defs');
  const rg   = document.createElementNS(NS, 'radialGradient');
  rg.setAttribute('id', 'lglow');
  rg.setAttribute('cx', '50%'); rg.setAttribute('cy', '50%'); rg.setAttribute('r', '50%');
  const st0 = document.createElementNS(NS, 'stop');
  st0.setAttribute('offset', '0%'); st0.setAttribute('stop-color', '#fff'); st0.setAttribute('stop-opacity', '0.3');
  const st1 = document.createElementNS(NS, 'stop');
  st1.setAttribute('offset', '58%'); st1.setAttribute('stop-color', '#fff'); st1.setAttribute('stop-opacity', '0');
  rg.appendChild(st0); rg.appendChild(st1); defs.appendChild(rg); svg.appendChild(defs);

  SEGS.forEach((c, i) => {
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', arcPath(i));
    path.setAttribute('fill', `hsl(${c.h},${c.s},${c.l})`);
    path.classList.add('loader-seg');
    path.style.animationDelay = (i * 0.08) + 's';
    svg.appendChild(path);
  });

  const glowC = document.createElementNS(NS, 'circle');
  glowC.setAttribute('cx', cx); glowC.setAttribute('cy', cy); glowC.setAttribute('r', OR);
  glowC.setAttribute('fill', 'url(#lglow)'); glowC.setAttribute('pointer-events', 'none');
  svg.appendChild(glowC);

  const pctEl = document.getElementById('loaderPercent');
  const t0    = performance.now();
  const DUR   = 1800;

  function tick(now) {
    const t = Math.min((now - t0) / DUR, 1);
    const eased = 1 - Math.pow(1 - t, 2.8);
    pctEl.textContent = Math.floor(eased * 100) + '%';
    if (t < 1) requestAnimationFrame(tick);
    else exitLoader();
  }
  requestAnimationFrame(tick);

  function exitLoader() {
    const loader = document.getElementById('pageLoader');
    const svgEl  = document.getElementById('loaderSvg');
    const wheel  = document.getElementById('loaderWheel');
    svgEl.style.transition = 'animation-duration 0.4s';
    svgEl.style.animationDuration = '0.8s';
    document.querySelectorAll('.loader-seg').forEach(seg => {
      seg.style.transition = 'filter 0.15s';
      seg.style.filter = 'brightness(2.4)';
    });
    setTimeout(() => {
      wheel.style.transition = 'transform 0.5s cubic-bezier(0.76,0,0.24,1)';
      wheel.style.transformOrigin = 'center';
      wheel.style.transform = 'scale(0)';
      loader.style.transition = 'opacity 0.4s ease 0.18s';
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.remove();
        triggerHeroEntrance();
      }, 750);
    }, 280);
  }
})();

function triggerHeroEntrance() {
  document.getElementById('heroEyebrow').classList.add('in');

// SCROLL REVEAL
// ══════════════════════════════════════════════
function initScrollReveal() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal, .section-title').forEach(el => obs.observe(el));
}

// ══════════════════════════════════════════════
(function() {
  const dot  = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  let rx = 0, ry = 0, mx = 0, my = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx + 'px'; dot.style.top = my + 'px'; });
  (function animRing() {
    rx += (mx - rx) * 0.14;
    ry += (my - ry) * 0.14;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(animRing);
  })();
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a, button, [role="button"]')) document.body.classList.add('cursor-hover');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('a, button, [role="button"]')) document.body.classList.remove('cursor-hover');
  });
})();

function allZero() {
  const p = getProgress();
  return TOPICS.every(t => !p[t.id] || p[t.id] === 0);
}

        correct: 2
      }
    ]
  }
};

// ══════════════════════════════════════════════
// BUILD TOPIC CARDS
// ══════════════════════════════════════════════
function buildTopicCards() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';
  const progress = getProgress();
  const showBadge = allZero();

  TOPICS.forEach((t, idx) => {
    const score = progress[t.id] || 0;
    const pct   = Math.round((score / 5) * 100);
    const btnLabel = score > 0 ? 'Continuar' : 'Comenzar';

    // Visual
    let visualHTML = '';
    if (t.visual === 'dots') {
      visualHTML = `<div class="topic-visual">${t.dotColors.map(c =>
        `<div class="topic-dot" style="background:${c}"></div>`
      ).join('')}</div>`;
    } else {
      const segs = t.barColors.map(c =>
        `<div class="color-strip-seg" style="background:${c}"></div>`
      ).join('');
      visualHTML = `<div class="topic-visual"><div class="topic-gradient-bar" style="display:flex;overflow:hidden;border-radius:4px;height:12px;border:1px solid rgba(255,255,255,0.07)">${segs}</div></div>`;
    }

    const badgeHTML = (idx === 0 && showBadge)
      ? `<span class="topic-badge">★ Empieza aquí</span>` : '';
    const starHTML = score === 5
      ? `<span class="topic-complete-badge" style="display:inline">★</span>` : '';

    const card = document.createElement('div');
    card.className = 'topic-card reveal reveal-d' + Math.min(idx + 1, 5);
    card.innerHTML = `
      <div class="topic-card-top">
        <span class="topic-number">${t.num}</span>
        <div style="display:flex;align-items:center;gap:0.4rem">${badgeHTML}${starHTML}</div>
      </div>
      <div class="topic-title">${t.title}</div>
      <div class="topic-desc">${t.desc}</div>
      ${visualHTML}
      <div class="topic-progress-wrap">
        <div class="topic-progress-label">
          <span class="topic-progress-text">Progreso</span>
          <span class="topic-progress-score">${score}/5</span>
        </div>
        <div class="topic-progress-track">
          <div class="topic-progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <button class="topic-btn">${btnLabel} →</button>
    `;
    card.addEventListener('click', () => openLesson(t.id));
    card.querySelector('.topic-btn').addEventListener('click', e => {
      e.stopPropagation();
      openLesson(t.id);
    });
    grid.appendChild(card);
  });

  // Re-observe new elements
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  grid.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

// ══════════════════════════════════════════════
// LESSON / QUIZ STATE
// ══════════════════════════════════════════════
let currentTopicId   = null;
let currentQuestion  = 0;
let answeredCount    = 0;
let correctCount     = 0;

function openLesson(topicId) {
  currentTopicId  = topicId;
  currentQuestion = 0;
  answeredCount   = 0;
  correctCount    = 0;

  const topic  = TOPICS.find(t => t.id === topicId);
  const lesson = LESSONS[topicId];

  // Update header
  document.getElementById('lessonNumLabel').textContent   = topic.num;
  document.getElementById('lessonTitleLabel').textContent = topic.title;
  document.getElementById('lessonProgressInfo').textContent = '0 / 5 preguntas';

  // Inject content
  document.getElementById('lessonContent').innerHTML = lesson.content;

  // Show lesson view, hide topic map
  document.getElementById('topicMap').style.display    = 'none';
  document.getElementById('lessonView').classList.add('active');
  document.getElementById('backSection').style.display = 'none';

  // Reset quiz UI
  document.getElementById('quizResults').classList.remove('show');
  document.getElementById('quizQuestionArea').style.display = 'block';
  document.getElementById('quizFeedback').classList.remove('show','ok','fail');
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizNextBtn').classList.remove('show');

  showQuestion(0);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeLesson() {
  document.getElementById('lessonView').classList.remove('active');
  document.getElementById('topicMap').style.display    = '';
  document.getElementById('backSection').style.display = '';
  buildTopicCards();
  window.scrollTo({ top: document.getElementById('topicMap').offsetTop - 90, behavior: 'smooth' });
}

document.getElementById('lessonBackBtn').addEventListener('click', closeLesson);

// ══════════════════════════════════════════════
// QUIZ RENDERING
// ══════════════════════════════════════════════
function showQuestion(idx) {
  const lesson = LESSONS[currentTopicId];
  const q      = lesson.quiz[idx];
  const total  = lesson.quiz.length;

  document.getElementById('quizCounter').textContent      = `Pregunta ${idx + 1} de ${total}`;
  document.getElementById('lessonProgressInfo').textContent = `${answeredCount} / ${total} preguntas`;
  document.getElementById('quizProgressFill').style.width  = ((idx / total) * 100) + '%';
  document.getElementById('quizQuestion').textContent = q.q;

  document.getElementById('quizFeedback').classList.remove('show','ok','fail');
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizNextBtn').classList.remove('show');

  const container = document.getElementById('quizOptionsContainer');
  container.innerHTML = '';

  if (q.type === 'multiple') {
    const grid = document.createElement('div');
    grid.className = 'quiz-options-grid';
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-option-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => handleAnswer(i, q, grid));
      grid.appendChild(btn);
    });
    container.appendChild(grid);
  } else {
    // visual-pick
    const grid = document.createElement('div');
    grid.className = 'quiz-visual-grid';
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-visual-btn';

      let swatchHTML = '';
      if (opt.colors.length === 1) {
        swatchHTML = `<div class="quiz-visual-swatch" style="background:${opt.colors[0]}"></div>`;
      } else {
        const segs = opt.colors.map(c =>
          `<div style="flex:1;background:${c}"></div>`
        ).join('');
        swatchHTML = `<div class="quiz-visual-swatch-row">${segs}</div>`;
      }
      btn.innerHTML = `${swatchHTML}<div class="quiz-visual-label">${opt.label}</div>`;
      btn.addEventListener('click', () => handleAnswer(i, q, grid));
      grid.appendChild(btn);
    });
    container.appendChild(grid);
  }
}

function handleAnswer(chosen, q, grid) {
  // Disable all buttons
  Array.from(grid.children).forEach(btn => btn.disabled = true);

  const isCorrect = chosen === q.correct;
  const btnClass  = q.type === 'multiple' ? 'quiz-option-btn' : 'quiz-visual-btn';

  Array.from(grid.children).forEach((btn, i) => {
    if (i === q.correct) {
      btn.classList.add(isCorrect ? 'correct' : 'reveal-correct');
    }
    if (i === chosen && !isCorrect) {
      btn.classList.add('wrong');
    }
  });

  if (isCorrect) correctCount++;
  answeredCount++;

  const fb = document.getElementById('quizFeedback');
  if (isCorrect) {
    fb.textContent = '✓ Correcto';
    fb.className = 'quiz-feedback show ok';
  } else {
    const correctLabel = q.type === 'multiple'
      ? q.opts[q.correct]
      : q.opts[q.correct].label;
    fb.textContent = `✗ Incorrecto — La respuesta correcta es: ${correctLabel}`;
    fb.className = 'quiz-feedback show fail';
  }

  document.getElementById('lessonProgressInfo').textContent = `${answeredCount} / ${LESSONS[currentTopicId].quiz.length} preguntas`;

  const nextBtn = document.getElementById('quizNextBtn');
  const isLast  = currentQuestion >= LESSONS[currentTopicId].quiz.length - 1;
  nextBtn.textContent = isLast ? 'Ver resultado →' : 'Siguiente →';
  nextBtn.classList.add('show');
}

document.getElementById('quizNextBtn').addEventListener('click', () => {
  const total = LESSONS[currentTopicId].quiz.length;
  currentQuestion++;
  if (currentQuestion >= total) {
    showResults();
  } else {
    showQuestion(currentQuestion);
  }
});

// ══════════════════════════════════════════════
// RESULTS SCREEN
// ══════════════════════════════════════════════
function showResults() {
  const topic = TOPICS.find(t => t.id === currentTopicId);

  // Save to localStorage
  setTopicScore(currentTopicId, correctCount);

  // Hide question area
  document.getElementById('quizQuestionArea').style.display = 'none';

  const ring = document.getElementById('resultsRing');
  ring.className = 'results-score-ring';
  if (correctCount === 5)      ring.classList.add('perfect');
  else if (correctCount >= 3)  ring.classList.add('good');
  else                         ring.classList.add('retry');

  document.getElementById('resultsNum').textContent = correctCount;

  const msgs = {
    5: ['¡Perfecto!', 'Dominaste este tema completamente. Estás listo para el siguiente.'],
    good: ['Buen trabajo', 'Entiendes bien los conceptos principales. Un repaso rápido y lo tendrás perfectamente.'],
    retry: ['Sigue practicando', 'Estos conceptos necesitan un poco más de tiempo. Te recomendamos releer el contenido y volver a intentarlo.']
  };
  const [msg, sub] = correctCount === 5 ? msgs[5] : correctCount >= 3 ? msgs.good : msgs.retry;
  document.getElementById('resultsMsg').textContent = msg;
  document.getElementById('resultsSub').textContent = sub;

  // Action buttons
  const actions = document.getElementById('resultsActions');
  actions.innerHTML = '';

  const btnBack = document.createElement('button');
  btnBack.className = 'results-btn results-btn-secondary';
  btnBack.textContent = '← Volver a temas';
  btnBack.addEventListener('click', closeLesson);
  actions.appendChild(btnBack);

  if (correctCount < 3) {
    const btnRetry = document.createElement('button');
    btnRetry.className = 'results-btn results-btn-primary';
    btnRetry.textContent = '↺ Intentar de nuevo';
    btnRetry.addEventListener('click', () => openLesson(currentTopicId));
    actions.appendChild(btnRetry);
  }

  // Next lesson button
  const topicIdx  = TOPICS.findIndex(t => t.id === currentTopicId);
  const nextTopic = TOPICS[topicIdx + 1];
  if (nextTopic) {
    const btnNext = document.createElement('button');
    btnNext.className = 'results-btn results-btn-primary';
    btnNext.textContent = `Siguiente: ${nextTopic.title} →`;
    btnNext.addEventListener('click', () => openLesson(nextTopic.id));
    actions.appendChild(btnNext);
  }

  // Tool integration button
  const btnTool = document.createElement('a');
  btnTool.className = 'results-btn results-btn-tool';
  btnTool.href      = topic.toolLink;
  btnTool.textContent = topic.toolLabel;
  actions.appendChild(btnTool);

  document.getElementById('quizResults').classList.add('show');

  // Update progress bar on counter
  document.getElementById('quizProgressFill').style.width = '100%';
  document.getElementById('quizCounter').textContent = `${correctCount} / 5 correctas`;
}
</script>
